name: Deploy to Cloud Run

# Fork 分支约定（便于合并上游 Documenso 官方更新）：
# - main：日常开发与合并 upstream/main，只跑 CI，不触发本部署。
# - staging：合并/快进到待测的 main 后 push → contract-test（Cloud Run staging）。
# - release：生产发布（与 deploy.yml「main → release」晋升一致）。
on:
  push:
    branches:
      - staging
      - release

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_REGION: europe-west1
  GAR_REPOSITORY: services
  IMAGE_NAME: contract-service

jobs:
  # ─── 判断目标环境 ────────────────────────────────────────────────
  setup:
    name: Setup environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.vars.outputs.environment }}
      cloud_run_service: ${{ steps.vars.outputs.cloud_run_service }}
    steps:
      - name: Determine deployment target
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" = "release" ]; then
            ENVIRONMENT="production"
            SERVICE="contract-service-prod"
          else
            ENVIRONMENT="staging"
            SERVICE="contract-service-staging"
          fi

          IMAGE="${GAR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"

          if [ -z "${GCP_PROJECT_ID:-}" ]; then
            echo "ERROR: GCP_PROJECT_ID is empty in setup job"
            exit 1
          fi

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "cloud_run_service=${SERVICE}" >> "$GITHUB_OUTPUT"

          echo "resolved ref=${GITHUB_REF_NAME}"
          echo "resolved env=${ENVIRONMENT}"
          echo "resolved image prefix=${GAR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}:"

  # ─── 构建并推送镜像到 Artifact Registry ─────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${GAR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          ENV_TAG="${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.environment }}-latest"

          if [ -z "${IMAGE:-}" ]; then
            echo "ERROR: IMAGE is empty in build-and-push job"
            exit 1
          fi

          echo "Using IMAGE=$IMAGE"
          echo "Using ENV_TAG=$ENV_TAG"

          docker build \
            -f ./docker/Dockerfile \
            --progress=plain \
            -t "$IMAGE" \
            -t "$ENV_TAG" \
            .

          docker push "$IMAGE"
          docker push "$ENV_TAG"

  # ─── 部署到 Staging（staging 分支 → contract-test）──────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    if: needs.setup.outputs.environment == 'staging'
    permissions:
      contents: read
      id-token: write
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 密钥在 GitHub → Settings → Environments → staging 里配置（与 production 同名、值不同）
      # 可选：在 GCP Secret Manager 配好后，把下面 env_vars 改成 secrets: ENV=secret-name:latest
      - name: Deploy to Cloud Run (Staging)
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: contract-service-staging
          region: ${{ env.GAR_REGION }}
          image: ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --add-cloudsql-instances=fundconnecthk-489906:europe-west1:fundconnecthk-contracts-db-staging
          env_vars: |
            NEXT_PUBLIC_WEBAPP_URL=${{ secrets.NEXT_PUBLIC_WEBAPP_URL }}
            NEXT_PRIVATE_INTERNAL_WEBAPP_URL=${{ secrets.NEXT_PRIVATE_INTERNAL_WEBAPP_URL }}
            NEXT_PRIVATE_DATABASE_URL=${{ secrets.NEXT_PRIVATE_DATABASE_URL }}
            NEXT_PRIVATE_DIRECT_DATABASE_URL=${{ secrets.NEXT_PRIVATE_DIRECT_DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXT_PRIVATE_ENCRYPTION_KEY=${{ secrets.NEXT_PRIVATE_ENCRYPTION_KEY }}
            NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY=${{ secrets.NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY }}
            NEXT_PRIVATE_SMTP_TRANSPORT=${{ secrets.NEXT_PRIVATE_SMTP_TRANSPORT }}
            NEXT_PRIVATE_SMTP_HOST=${{ secrets.NEXT_PRIVATE_SMTP_HOST }}
            NEXT_PRIVATE_SMTP_PORT=${{ secrets.NEXT_PRIVATE_SMTP_PORT }}
            NEXT_PRIVATE_SMTP_USERNAME=${{ secrets.NEXT_PRIVATE_SMTP_USERNAME }}
            NEXT_PRIVATE_SMTP_PASSWORD=${{ secrets.NEXT_PRIVATE_SMTP_PASSWORD }}
            NEXT_PRIVATE_SMTP_FROM_NAME=${{ secrets.NEXT_PRIVATE_SMTP_FROM_NAME }}
            NEXT_PRIVATE_SMTP_FROM_ADDRESS=${{ secrets.NEXT_PRIVATE_SMTP_FROM_ADDRESS }}
            NEXT_PUBLIC_UPLOAD_TRANSPORT=${{ secrets.NEXT_PUBLIC_UPLOAD_TRANSPORT }}
            NEXT_PRIVATE_UPLOAD_ENDPOINT=${{ secrets.NEXT_PRIVATE_UPLOAD_ENDPOINT }}
            NEXT_PRIVATE_UPLOAD_FORCE_PATH_STYLE=${{ secrets.NEXT_PRIVATE_UPLOAD_FORCE_PATH_STYLE }}
            NEXT_PRIVATE_UPLOAD_REGION=${{ secrets.NEXT_PRIVATE_UPLOAD_REGION }}
            NEXT_PRIVATE_UPLOAD_BUCKET=${{ secrets.NEXT_PRIVATE_UPLOAD_BUCKET }}
            NEXT_PRIVATE_UPLOAD_ACCESS_KEY_ID=${{ secrets.NEXT_PRIVATE_UPLOAD_ACCESS_KEY_ID }}
            NEXT_PRIVATE_UPLOAD_SECRET_ACCESS_KEY=${{ secrets.NEXT_PRIVATE_UPLOAD_SECRET_ACCESS_KEY }}

      - name: Show Staging URL
        run: echo "Staging deployed to ${{ steps.deploy.outputs.url }}"

  # ─── 部署到 Production（release 分支）──────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    if: needs.setup.outputs.environment == 'production'
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run (Production)
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: contract-service-prod
          region: ${{ env.GAR_REGION }}
          image: ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --add-cloudsql-instances=fundconnecthk-489906:europe-west1:fundconnecthk-contracts-db-prod
          env_vars: |
            NEXT_PUBLIC_WEBAPP_URL=${{ secrets.NEXT_PUBLIC_WEBAPP_URL }}
            NEXT_PRIVATE_INTERNAL_WEBAPP_URL=${{ secrets.NEXT_PRIVATE_INTERNAL_WEBAPP_URL }}
            NEXT_PRIVATE_DATABASE_URL=${{ secrets.NEXT_PRIVATE_DATABASE_URL }}
            NEXT_PRIVATE_DIRECT_DATABASE_URL=${{ secrets.NEXT_PRIVATE_DIRECT_DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXT_PRIVATE_ENCRYPTION_KEY=${{ secrets.NEXT_PRIVATE_ENCRYPTION_KEY }}
            NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY=${{ secrets.NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY }}
            NEXT_PRIVATE_SMTP_TRANSPORT=${{ secrets.NEXT_PRIVATE_SMTP_TRANSPORT }}
            NEXT_PRIVATE_SMTP_HOST=${{ secrets.NEXT_PRIVATE_SMTP_HOST }}
            NEXT_PRIVATE_SMTP_PORT=${{ secrets.NEXT_PRIVATE_SMTP_PORT }}
            NEXT_PRIVATE_SMTP_USERNAME=${{ secrets.NEXT_PRIVATE_SMTP_USERNAME }}
            NEXT_PRIVATE_SMTP_PASSWORD=${{ secrets.NEXT_PRIVATE_SMTP_PASSWORD }}
            NEXT_PRIVATE_SMTP_FROM_NAME=${{ secrets.NEXT_PRIVATE_SMTP_FROM_NAME }}
            NEXT_PRIVATE_SMTP_FROM_ADDRESS=${{ secrets.NEXT_PRIVATE_SMTP_FROM_ADDRESS }}
            NEXT_PUBLIC_UPLOAD_TRANSPORT=${{ secrets.NEXT_PUBLIC_UPLOAD_TRANSPORT }}
            NEXT_PRIVATE_UPLOAD_ENDPOINT=${{ secrets.NEXT_PRIVATE_UPLOAD_ENDPOINT }}
            NEXT_PRIVATE_UPLOAD_FORCE_PATH_STYLE=${{ secrets.NEXT_PRIVATE_UPLOAD_FORCE_PATH_STYLE }}
            NEXT_PRIVATE_UPLOAD_REGION=${{ secrets.NEXT_PRIVATE_UPLOAD_REGION }}
            NEXT_PRIVATE_UPLOAD_BUCKET=${{ secrets.NEXT_PRIVATE_UPLOAD_BUCKET }}
            NEXT_PRIVATE_UPLOAD_ACCESS_KEY_ID=${{ secrets.NEXT_PRIVATE_UPLOAD_ACCESS_KEY_ID }}
            NEXT_PRIVATE_UPLOAD_SECRET_ACCESS_KEY=${{ secrets.NEXT_PRIVATE_UPLOAD_SECRET_ACCESS_KEY }}

      - name: Show Production URL
        run: echo "Production deployed to ${{ steps.deploy.outputs.url }}"
